<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página no encontrada | Marea Tattoo Studio</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/logo_transparente.png" type="image/png" />
    <style>
      :root {
        --bg: #050507;
        --text: #f9fafc;
        --muted: rgba(249, 250, 252, 0.72);
        --accent: #1ed760;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        padding: 2rem;
        font-family: system-ui, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, rgba(30, 215, 96, 0.1), transparent 50%),
          var(--bg);
        color: var(--text);
        text-align: center;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
        margin: 0 0 0.75rem;
      }
      p {
        color: var(--muted);
        max-width: 28rem;
        margin: 0 auto 1.75rem;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 1.75rem;
        border-radius: 999px;
        background: linear-gradient(120deg, #1ed760, #40ffa0);
        color: #00150a;
        font-weight: 600;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 0.85rem;
      }
      a:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <h1>No encontramos esta página</h1>
    <p>
      El enlace puede estar desactualizado o la dirección tiene un error. Vuelve al inicio para
      explorar Marea Tattoo Studio.
    </p>
    <a href="/">Ir al inicio</a>
  </body>
</html>
